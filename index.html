<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Cara Blanca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #219150;
    }
    .vaca {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>🐄 Admin Cara Blanca</h1>
</header>

<div class="container">

  <div class="card">
    <h2>Agregar vaca</h2>
    <input type="text" id="nombre" placeholder="Nombre o número">
    <input type="date" id="fecha">
    <button onclick="agregarVaca()">Guardar</button>
  </div>

  <div class="card">
    <h2>Listado</h2>
    <div id="lista"></div>
  </div>

</div>

<script>
  let vacas = JSON.parse(localStorage.getItem('vacas')) || [];

  function guardar() {
    localStorage.setItem('vacas', JSON.stringify(vacas));
  }

  function agregarVaca() {
    const nombre = document.getElementById('nombre').value;
    const fecha = document.getElementById('fecha').value;

    if (!nombre) {
      alert('Ponle nombre o número');
      return;
    }

    vacas.push({ nombre, fecha });
    guardar();
    mostrar();

    document.getElementById('nombre').value = '';
    document.getElementById('fecha').value = '';
  }

  function eliminar(index) {
    vacas.splice(index, 1);
    guardar();
    mostrar();
  }

  function mostrar() {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    vacas.forEach((vaca, i) => {
      lista.innerHTML += `
        <div class="vaca">
          <strong>${vaca.nombre}</strong><br>
          Última fecha: ${vaca.fecha || 'Sin registro'}<br>
          <button onclick="eliminar(${i})">Eliminar</button>
        </div>
      `;
    });
  }

  mostrar();
</script>

</body>
</html>
